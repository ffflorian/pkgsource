name: Lint, test, and publish

permissions: {}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint_test_typescript:
    name: Lint, test and build TypeScript
    permissions:
      contents: read
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 26
          cache: yarn

      - name: Install dependencies
        run: yarn --immutable

      - name: Lint, test and build
        run: |
          yarn lint
          yarn test
          yarn build

  lint_dockerfile:
    name: Lint Dockerfile
    permissions:
      contents: read
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5

  build_dockerfile:
    name: Build Docker image
    needs: lint_dockerfile
    permissions:
      contents: read
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Build Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          push: false

  publish:
    name: Publish Release and Docker image
    needs:
      - build_dockerfile
      - lint_test_typescript
    permissions:
      contents: write
      packages: write
      issues: write
    outputs:
      new_release_published: ${{ steps.publish_release.outputs.new_release_published }}
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Publish Release and Docker image
        id: publish_release
        uses: ffflorian/actions/docker-image-release@395dd69a8fe27cbaaf9ee09ebfaeefaf92dfdda5
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          git_author: 'ffflorian'
          git_email: 'git@ffflorian.de'
