name: Mirror to Codeberg and GitLab


on:
  push:
    branches: [main]

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: ffflorian/actions/git-mirror@4e565c78750bb5f2cc44c9b954f89292a5df6b1b
        with:
          GITLAB_REMOTE: 'git@gitlab.com:ffflorian/pkgsource.git'
          GITLAB_SECRET: ${{ secrets.GITLAB_SECRET }}
          GITLAB_PUSH_ALL_REFS: 'false'
          CODEBERG_REMOTE: 'git@codeberg.org:ffflorian/pkgsource.git'
          CODEBERG_SECRET: ${{ secrets.CODEBERG_SECRET }}
          CODEBERG_PUSH_ALL_REFS: 'false'
