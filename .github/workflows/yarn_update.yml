name: Check for yarn updates

on:
  schedule:
    - cron: '0 5 1 * *'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/yarn_update.yml'
  workflow_dispatch:

permissions: {}
jobs:
  yarn-update-check:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Update yarn
        uses: ffflorian/actions/yarn-update@4e565c78750bb5f2cc44c9b954f89292a5df6b1b
        with:
          git_authorship: 'Florian Imdahl <git@ffflorian.de>'
